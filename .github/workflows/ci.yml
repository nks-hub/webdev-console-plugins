name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # NOTE: plugin csprojs currently reference the Plugin.SDK via relative
  # ProjectReference (`..\..\daemon\NKS.WebDevConsole.Plugin.SDK\...`)
  # inherited from the monorepo layout. Until the SDK ships as a NuGet
  # package (tracked as F100), the real build happens inside the main
  # nks-ws CI where those relative paths resolve. Here we run a
  # structural smoke check: verify every plugin has a csproj + plugin.json,
  # validate JSON + XML parse, and fail loud if a plugin is missing
  # either file. This prevents merging half-scaffolded plugins into
  # main.
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install helpers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-utils jq
      - name: Verify every plugin has csproj + plugin.json
        run: |
          set -e
          missing=0
          for dir in NKS.WebDevConsole.Plugin.*/; do
            name=$(basename "$dir")
            csproj="$dir${name}.csproj"
            manifest="${dir}plugin.json"
            readme="${dir}README.md"
            if [ ! -f "$csproj" ]; then
              echo "::error file=$csproj::$name missing csproj"
              missing=$((missing+1))
            else
              if ! xmllint --noout "$csproj" 2>/dev/null; then
                echo "::error file=$csproj::malformed XML in $csproj"
                missing=$((missing+1))
              fi
            fi
            if [ ! -f "$manifest" ]; then
              echo "::warning file=$dir::$name missing plugin.json (expected for ship-ready plugins)"
            else
              if ! jq empty "$manifest" 2>/dev/null; then
                echo "::error file=$manifest::malformed JSON in $manifest"
                missing=$((missing+1))
              fi
            fi
            if [ ! -f "$readme" ]; then
              echo "::warning file=$dir::$name missing README.md"
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "::error::$missing structural issues found"
            exit 1
          fi
          echo "All plugins structurally valid."

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify core docs exist
        run: |
          set -e
          for f in README.md LICENSE SECURITY.md CONTRIBUTING.md docs/PLUGIN-API.md docs/MANIFEST.md docs/WRITING-A-PLUGIN.md; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::missing required doc"
              exit 1
            fi
          done
          echo "All required docs present."
